<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Commerce | Login & Register</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <nav class="navbar glass-panel">
        <div class="nav-brand"><a href="index.html" style="color: inherit;">ShopElite</a></div>
        <div class="nav-links">
            <a href="index.html" class="nav-item">Back to Catalog</a>
        </div>
    </nav>

    <main class="container auth-container">
        <div class="glass-panel auth-box">
            <!-- Login Form -->
            <div id="login-section">
                <h2 class="auth-title">Welcome Back</h2>
                <div id="auth-alert" class="alert"></div>
                
                <form id="login-form">
                    <div class="form-group">
                        <label class="form-label">Username</label>
                        <input type="text" id="login-username" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Password</label>
                        <input type="password" id="login-password" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-primary" style="width: 100%;">Sign In</button>
                </form>
                
                <p style="text-align: center; margin-top: 1.5rem; font-size: 0.9rem; color: var(--text-secondary);">
                    Don't have an account? <a href="#" id="show-register" style="color: var(--accent-primary);">Register here</a>
                </p>
            </div>

            <!-- Register Form (Hidden by default) -->
            <div id="register-section" style="display: none;">
                <h2 class="auth-title">Create Account</h2>
                
                <form id="register-form">
                    <div class="form-group">
                        <label class="form-label">Username</label>
                        <input type="text" id="reg-username" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Email</label>
                        <input type="email" id="reg-email" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Password</label>
                        <input type="password" id="reg-password" class="form-control" required>
                    </div>
                    <div class="form-group" style="display: flex; align-items: center; gap: 0.5rem; margin-top: 1rem; margin-bottom: 1.5rem;">
                        <input type="checkbox" id="reg-admin" style="width: auto;">
                        <label for="reg-admin" style="font-size: 0.9rem; margin-bottom: 0;">Register as Administrator</label>
                    </div>
                    <button type="submit" class="btn btn-primary" style="width: 100%;">Register</button>
                </form>
                
                <p style="text-align: center; margin-top: 1.5rem; font-size: 0.9rem; color: var(--text-secondary);">
                    Already have an account? <a href="#" id="show-login" style="color: var(--accent-primary);">Sign in</a>
                </p>
            </div>
        </div>
    </main>

    <script src="js/api.js?v=4"></script>
    <script src="js/auth.js?v=4"></script>
</body>
</html>
